# Development profile configuration
spring.application.name=Car-Rental
server.port=8080

# Database configuration with more detailed logging
spring.datasource.url=jdbc:mysql://localhost:3306/car_rental?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234567
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Logging for debugging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Disable MongoDB for now to focus on MySQL
# spring.data.mongodb.uri=mongodb://localhost:27017/car

# JWT configuration
jwt.secret=car_rental_platform_pgdac_2025
jwt.expiration-ms=3600000
